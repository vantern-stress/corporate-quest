<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Corporate Quest — Productivity with a Dash of Game</title>

  <!-- Tailwind (utility styling) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Framer Motion (UMD) -->
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>

  <!-- Babel (compile the JSX in-browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Simple progress bar base */
    .progress-track { background: rgba(0,0,0,0.08); }
    .glass {
      backdrop-filter: blur(8px);
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-100 via-sky-100 to-emerald-100 p-6">
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo } = React;
    const { motion, AnimatePresence } = window["framer-motion"];

    // -------- Utilities --------
    const STORAGE_KEY = "corporate-quest-singlefile-v1";
    const uid = () => Date.now() + Math.random().toString(36).slice(2, 7);

    // XP needed for next level (scales mildly)
    const xpForLevel = (lvl) => 100 * lvl;

    // -------- App --------
    function App() {
      const [state, setState] = useState(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : {
            tasks: [
              { id: uid(), text: "Finish weekly report", done: false, rewarded: false },
              { id: uid(), text: "Inbox zero (15 mins)", done: false, rewarded: false },
              { id: uid(), text: "Prep slides for standup", done: false, rewarded: false },
            ],
            xp: 0,
            level: 1,
            coins: 0,
          };
        } catch {
          return { tasks: [], xp: 0, level: 1, coins: 0 };
        }
      });

      const [newTask, setNewTask] = useState("");
      const [toast, setToast] = useState(null);         // small success/info messages
      const [promoMsg, setPromoMsg] = useState(null);   // promotion popup
      const [politicsMsg, setPoliticsMsg] = useState(null); // office politics popup

      // Persist
      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }, [state]);

      // Derived
      const needed = useMemo(() => xpForLevel(state.level), [state.level]);
      const pct = Math.min(100, Math.round((state.xp / needed) * 100));

      // Level-up check with carry-over XP
      useEffect(() => {
        if (state.xp >= needed) {
          setState(prev => {
            let xp = prev.xp;
            let lvl = prev.level;
            while (xp >= xpForLevel(lvl)) {
              xp -= xpForLevel(lvl);
              lvl += 1;
            }
            return { ...prev, xp, level: lvl };
          });
          setPromoMsg(`🎉 Promotion! Welcome to Level ${state.level + 1}`);
        }
        // eslint-disable-next-line
      }, [state.xp, needed]);

      // --- Actions ---
      function addTask() {
        if (!newTask.trim()) return;
        setState(prev => ({
          ...prev,
          tasks: [...prev.tasks, { id: uid(), text: newTask.trim(), done: false, rewarded: false }],
        }));
        setNewTask("");
        setToast("➕ Task added");
      }

      function deleteTask(id) {
        setState(prev => ({ ...prev, tasks: prev.tasks.filter(t => t.id !== id) }));
        setToast("🗑️ Task deleted");
      }

      function completeTask(id) {
        setState(prev => {
          const tasks = prev.tasks.map(t => t.id === id ? { ...t, done: true } : t);
          const task = prev.tasks.find(t => t.id === id);
          if (!task || task.done) return prev; // already done, no double reward

          const xpGain = 25;
          const coinGain = 10;

          const updated = {
            ...prev,
            tasks,
            xp: prev.xp + xpGain,
            coins: prev.coins + coinGain,
          };

          return updated;
        });

        setToast("✅ Completed: +25 XP, +10 Coins");

        // 30% chance of office politics event shortly after completion
        if (Math.random() < 0.30) {
          setTimeout(() => triggerOfficePolitics(), 500);
        }
      }

      function triggerOfficePolitics() {
        const events = [
          { text: "😡 Coworker claimed credit. -10 XP", xp: -10, coins: 0 },
          { text: "🤝 You impressed leadership. +20 XP", xp: +20, coins: 0 },
          { text: "💼 Rumor: you're promotion material. +15 Coins", xp: 0, coins: +15 },
          { text: "📉 Budget cuts hit a project. One pending task removed", xp: 0, coins: 0, removeTask: true },
        ];
        const ev = events[Math.floor(Math.random() * events.length)];

        setState(prev => {
          let xp = Math.max(0, prev.xp + (ev.xp || 0));
          let coins = prev.coins + (ev.coins || 0);
          let tasks = prev.tasks;

          if (ev.removeTask) {
            // Remove the LAST not-done task if any; don't punish completed work
            const idx = tasks.slice().reverse().findIndex(t => !t.done);
            if (idx !== -1) {
              const realIndex = tasks.length - 1 - idx;
              tasks = tasks.filter((_, i) => i !== realIndex);
            }
          }
          return { ...prev, xp, coins, tasks };
        });

        setPoliticsMsg(ev.text);
      }

      function resetProgress() {
        if (!confirm("Reset all progress? This will clear tasks, XP, coins, and levels.")) return;
        setState({
          tasks: [],
          xp: 0,
          level: 1,
          coins: 0,
        });
        setToast("🔁 Progress reset");
      }

      return (
        <div className="mx-auto max-w-3xl">
          {/* Header */}
          <div className="mb-6 flex flex-wrap items-center justify-between gap-3">
            <div className="flex items-center gap-3">
              <div className="h-12 w-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-emerald-400 shadow flex items-center justify-center text-white text-2xl">
                🧳
              </div>
              <div>
                <h1 className="text-2xl font-bold tracking-tight">Corporate Quest</h1>
                <p className="text-sm text-slate-600">Stay productive. Get promoted. Feel the momentum.</p>
              </div>
            </div>
            <button
              onClick={resetProgress}
              className="px-3 py-2 rounded-xl border text-slate-700 hover:bg-white/60"
              title="Reset all data (localStorage)"
            >
              Reset All
            </button>
          </div>

          {/* Status Cards */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="glass rounded-2xl p-4 shadow">
              <div className="text-sm text-slate-500">Level</div>
              <div className="text-2xl font-semibold">{state.level}</div>
              <div className="mt-3 text-sm">Progress to next promotion</div>
              <div className="mt-2 h-2 w-full rounded-full progress-track">
                <div className="h-2 rounded-full bg-gradient-to-r from-indigo-500 to-emerald-400" style={{width: pct + "%"}} />
              </div>
              <div className="mt-1 text-xs text-slate-600">{state.xp}/{xpForLevel(state.level)} XP</div>
            </div>

            <div className="glass rounded-2xl p-4 shadow">
              <div className="text-sm text-slate-500">Coins</div>
              <div className="text-2xl font-semibold">💰 {state.coins}</div>
              <div className="mt-1 text-xs text-slate-600">Earned from completed tasks (10 each)</div>
            </div>

            <div className="glass rounded-2xl p-4 shadow">
              <div className="text-sm text-slate-500">Tasks</div>
              <div className="text-2xl font-semibold">
                {state.tasks.filter(t => t.done).length} / {state.tasks.length} done
              </div>
              <div className="mt-1 text-xs text-slate-600">Small wins → steady progress</div>
            </div>
          </div>

          {/* Add Task */}
          <div className="mt-6 glass rounded-2xl p-4 shadow">
            <div className="flex gap-2">
              <input
                className="flex-1 rounded-xl border px-3 py-2"
                placeholder="Add a task (e.g., Draft Q3 plan)"
                value={newTask}
                onChange={e => setNewTask(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") addTask(); }}
              />
              <button
                onClick={addTask}
                className="rounded-xl bg-emerald-500 text-white px-4 py-2 hover:bg-emerald-600"
              >
                Add
              </button>
            </div>
          </div>

          {/* Task List */}
          <div className="mt-4 grid gap-3">
            <AnimatePresence>
              {state.tasks.map(task => (
                <motion.div
                  key={task.id}
                  initial={{ opacity: 0, y: 8 }}
                  animate={{ opacity: 1, y: 0 }}
                  exit={{ opacity: 0, y: -8 }}
                  className={"rounded-2xl p-3 shadow flex items-center justify-between " + (task.done ? "bg-emerald-50" : "bg-white")}
                >
                  <div className="flex items-center gap-3">
                    <div className={"h-8 w-8 rounded-xl flex items-center justify-center text-lg " + (task.done ? "bg-emerald-200" : "bg-indigo-100")}>
                      {task.done ? "✅" : "⭐"}
                    </div>
                    <div>
                      <div className={"font-medium " + (task.done ? "line-through text-slate-500" : "")}>{task.text}</div>
                      <div className="text-xs text-slate-500">{task.done ? "Completed" : "Tap complete to earn +25 XP, +10 Coins"}</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    {!task.done && (
                      <button
                        onClick={() => completeTask(task.id)}
                        className="rounded-xl bg-indigo-500 text-white px-3 py-1 hover:bg-indigo-600"
                      >
                        Complete
                      </button>
                    )}
                    <button
                      onClick={() => deleteTask(task.id)}
                      className="rounded-xl bg-rose-500 text-white px-2.5 py-1 hover:bg-rose-600"
                      title="Delete task"
                    >
                      🗑️
                    </button>
                  </div>
                </motion.div>
              ))}
            </AnimatePresence>
          </div>

          {/* Toast / Messages */}
          <div className="pointer-events-none fixed inset-x-0 top-4 flex justify-center">
            <AnimatePresence>
              {toast && (
                <motion.div
                  initial={{ y: -20, opacity: 0 }}
                  animate={{ y: 0, opacity: 1 }}
                  exit={{ y: -20, opacity: 0 }}
                  onAnimationComplete={() => {
                    // Auto-hide after 1.5s
                    setTimeout(() => setToast(null), 1500);
                  }}
                  className="pointer-events-auto rounded-xl bg-slate-900 text-white px-4 py-2 shadow-lg"
                >
                  {toast}
                </motion.div>
              )}
            </AnimatePresence>
          </div>

          {/* Promotion modal */}
          <AnimatePresence>
            {promoMsg && (
              <motion.div
                className="fixed inset-0 z-10 grid place-items-center bg-black/30"
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
              >
                <motion.div
                  initial={{ scale: 0.95, opacity: 0, y: 10 }}
                  animate={{ scale: 1, opacity: 1, y: 0 }}
                  exit={{ scale: 0.98, opacity: 0, y: -10 }}
                  className="glass rounded-2xl p-6 shadow-xl max-w-sm w-full"
                >
                  <div className="text-3xl">🏆</div>
                  <h2 className="mt-2 text-xl font-semibold">Promotion!</h2>
                  <p className="mt-1 text-slate-700">{promoMsg}</p>
                  <button
                    onClick={() => setPromoMsg(null)}
                    className="mt-4 w-full rounded-xl bg-indigo-600 text-white py-2 hover:bg-indigo-700"
                  >
                    Awesome
                  </button>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Office politics modal */}
          <AnimatePresence>
            {politicsMsg && (
              <motion.div
                className="fixed inset-0 z-10 grid place-items-center bg-black/30"
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
              >
                <motion.div
                  initial={{ scale: 0.95, opacity: 0, y: 10 }}
                  animate={{ scale: 1, opacity: 1, y: 0 }}
                  exit={{ scale: 0.98, opacity: 0, y: -10 }}
                  className="glass rounded-2xl p-6 shadow-xl max-w-sm w-full"
                >
                  <div className="text-3xl">🗣️</div>
                  <h2 className="mt-2 text-xl font-semibold">Office Politics</h2>
                  <p className="mt-1 text-slate-700">{politicsMsg}</p>
                  <button
                    onClick={() => setPoliticsMsg(null)}
                    className="mt-4 w-full rounded-xl bg-emerald-600 text-white py-2 hover:bg-emerald-700"
                  >
                    Continue
                  </button>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          <footer className="mt-10 text-center text-xs text-slate-600">
            Local-first. Your data stays in your browser.
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
