<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Office Productivity Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to right, #a1c4fd, #c2e9fb); /* Single gradient */
    background-size: cover;
    background-position: center;
    font-family: sans-serif;
  }
  #task-input {
    width: 100%;
  }
  .task-card {
    transition: transform 0.2s;
  }
  .task-card:hover {
    transform: scale(1.03);
  }
</style>
</head>
<body>

<div id="initial-screen" class="bg-white bg-opacity-90 p-6 rounded shadow-md w-full max-w-md text-center">
  <h1 class="text-2xl font-bold mb-4">Welcome to Office Productivity Game</h1>
  <p class="mb-4">Enter your boss's name:</p>
  <input id="boss-input" type="text" placeholder="Masqati" class="p-2 border rounded w-full mb-4">
  <button id="start-btn" class="bg-blue-500 text-white px-4 py-2 rounded">Start Game</button>
</div>

<div id="game-screen" class="hidden bg-white bg-opacity-80 p-6 rounded shadow-md w-full max-w-xl">
  <h1 class="text-2xl font-bold mb-4 text-center">Office Productivity Game</h1>

  <!-- Task Input -->
  <div class="mb-4 flex gap-2">
    <input id="task-input" type="text" placeholder="Enter a task..." class="p-2 border rounded flex-1">
    <select id="priority-select" class="p-2 border rounded">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
    <button id="add-task-btn" class="bg-blue-500 text-white px-4 rounded">Add</button>
  </div>

  <!-- Task List -->
  <div id="tasks" class="space-y-2 mb-4"></div>

  <!-- Random Event -->
  <div id="event" class="text-center text-sm italic text-gray-700 mb-2"></div>
</div>

<script>
const taskInput = document.getElementById('task-input');
const addBtn = document.getElementById('add-task-btn');
const tasksDiv = document.getElementById('tasks');
const prioritySelect = document.getElementById('priority-select');
const eventDiv = document.getElementById('event');
const initialScreen = document.getElementById('initial-screen');
const gameScreen = document.getElementById('game-screen');
const bossInput = document.getElementById('boss-input');

let tasks = [];
let bossName = 'Masqati';

const memes = [
  // Positive
  "You're crushing your to-do list!",
  "Everything is going smoothly!",
  "Efficiency is your middle name!",
  "Your focus is inspiring!",
  "Productivity level: expert!",
  "Boss is impressed!",
  "You nailed that task!",
  "Smooth sailing today!",
  "Keep up the great work!",
  "Your workflow is legendary!",
  "No distractions today!",
  "You're a task-completion machine!",
  "Goals are being smashed!",
  "You’re setting office records!",
  "All tasks on point!",
  // Funny
  "Don't forget the TPS reports!",
  "Another meeting that could have been an email...",
  "Time to dominate your to-do list!",
  "Keep calm and pretend it's on the schedule.",
  "Your boss just popped in… look busy!",
  "Someone stole your stapler… again.",
  "Coffee machine broken: panic ensues.",
  "Email sent to wrong person… again!",
  "Printer jammed: heroic fix required.",
  "Desk avalanche incoming!",
  "Keyboard is sticky… mysterious donut culprit.",
  "Spilled coffee: chaos begins.",
  "Spreadsheet nightmares return.",
  "Someone microwaved fish in the break room.",
  "WiFi drops during critical task!",
  // Negative
  "You missed a deadline!",
  "Task backlog is growing!",
  "Boss looks disappointed...",
  "Oops, email typo!",
  "Printer broke again!",
  "Lost important file!",
  "Meeting ran too long!",
  "Unplanned tasks incoming!",
  "Spreadsheet crashed!",
  "Deadline pressure rising!",
  "Coffee ran out… tragedy strikes!",
  "Team needs urgent help!",
  "Forgot to save your work!",
  "Computer running slow!",
  "Unexpected bug appeared!"
];

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function showRandomEvent() {
  eventDiv.textContent = pickRandom(memes);
}

function renderTasks() {
  tasksDiv.innerHTML = '';
  tasks.forEach((task, idx) => {
    const card = document.createElement('div');
    card.className = `task-card flex justify-between items-center p-2 border rounded bg-white`;
    
    // Color-coded priority
    let colorClass = 'text-gray-700';
    if(task.priority === 'High') colorClass = 'text-red-600';
    if(task.priority === 'Medium') colorClass = 'text-yellow-600';
    if(task.priority === 'Low') colorClass = 'text-green-600';

    card.innerHTML = `
      <div>
        <strong class="${colorClass}">[${task.priority}]</strong> ${task.text}
      </div>
      <div class="flex gap-2">
        <button class="bg-green-500 text-white px-2 rounded" onclick="completeTask(${idx})">Complete</button>
        <button class="bg-red-500 text-white px-2 rounded" onclick="deleteTask(${idx})">Delete</button>
      </div>
    `;
    tasksDiv.appendChild(card);
  });
}

function addTask() {
  const text = taskInput.value.trim();
  const priority = prioritySelect.value;
  if(!text) return;
  tasks.push({text, priority});
  taskInput.value = '';
  renderTasks();
  showRandomEvent();
}

function deleteTask(idx) {
  tasks.splice(idx,1);
  renderTasks();
  showRandomEvent();
}

function completeTask(idx) {
  const completedTask = tasks.splice(idx,1)[0];
  alert(`${bossName} says: ✅ ${completedTask.text} is done!`);
  renderTasks();
  showRandomEvent();
  if(tasks.length === 0) {
    setTimeout(() => {
      alert(`${bossName} says: 🎉 All tasks done! Time for a coffee break!`);
    }, 200);
  }
}

// Initial screen start button
document.getElementById('start-btn').addEventListener('click', () => {
  bossName = bossInput.value.trim() || 'Masqati';
  initialScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  showRandomEvent();
});

// Event listeners for adding tasks
addBtn.addEventListener('click', addTask);
taskInput.addEventListener('keypress', e => {
  if(e.key === 'Enter') addTask();
});

</script>
</body>
</html>
