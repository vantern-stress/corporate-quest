<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Productivity Game</title>
<!-- Tailwind CDN for styling -->
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Smooth transitions for task adding/removing */
  .task-enter {
    opacity: 0;
    transform: translateY(-10px);
  }
  .task-enter-active {
    opacity: 1;
    transform: translateY(0);
    transition: all 0.3s ease;
  }
  .task-exit {
    opacity: 1;
    transform: translateY(0);
  }
  .task-exit-active {
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
  }
</style>
</head>
<body class="bg-gray-100 font-sans p-6">

<div class="max-w-xl mx-auto bg-white rounded-xl shadow-md p-6">
  <h1 class="text-2xl font-bold mb-4">Office Productivity Game</h1>
  
  <div class="mb-4">
    <input id="taskInput" type="text" placeholder="Add a new task..." class="border rounded p-2 w-full" />
    <button id="addTaskBtn" class="bg-blue-500 text-white rounded p-2 mt-2 w-full hover:bg-blue-600">Add Task</button>
  </div>

  <ul id="taskList" class="space-y-2">
    <!-- Tasks appear here -->
  </ul>

  <div class="mt-6">
    <h2 class="text-xl font-semibold mb-2">Progress</h2>
    <div class="bg-gray-200 rounded-full h-4 w-full overflow-hidden">
      <div id="progressBar" class="bg-green-500 h-4 w-0 transition-all duration-300"></div>
    </div>
    <p id="progressText" class="mt-1 text-gray-700">0% completed</p>
  </div>

  <div class="mt-6 p-4 bg-yellow-50 rounded">
    <p id="officeIntrigue" class="text-gray-800 italic">Watch out! Your manager is eyeing your progress...</p>
  </div>
</div>

<script>
  const taskInput = document.getElementById('taskInput');
  const addTaskBtn = document.getElementById('addTaskBtn');
  const taskList = document.getElementById('taskList');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  const officeIntrigue = document.getElementById('officeIntrigue');

  let tasks = [];

  function updateProgress() {
    const completed = tasks.filter(t => t.completed).length;
    const total = tasks.length || 1;
    const percent = Math.round((completed / total) * 100);
    progressBar.style.width = percent + '%';
    progressText.textContent = `${percent}% completed`;

    // Random office intrigue flavor text
    if (Math.random() < 0.2) {
      const messages = [
        "Your coworker just bragged about finishing a similar task faster.",
        "The manager seems pleased with your efficiency.",
        "Rumor: The office coffee machine is out of order!",
        "A colleague secretly stole your sticky note idea.",
        "HR is monitoring task completion closely today."
      ];
      officeIntrigue.textContent = messages[Math.floor(Math.random() * messages.length)];
    }
  }

  function renderTasks() {
    taskList.innerHTML = '';
    tasks.forEach((task, index) => {
      const li = document.createElement('li');
      li.className = 'task bg-gray-50 p-2 rounded flex justify-between items-center shadow-sm';
      if (task.completed) li.classList.add('line-through', 'text-gray-400');

      const span = document.createElement('span');
      span.textContent = task.name;
      span.onclick = () => {
        tasks[index].completed = !tasks[index].completed;
        renderTasks();
        updateProgress();
      };

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.className = 'ml-2 text-red-500 hover:text-red-700';
      deleteBtn.onclick = () => {
        tasks.splice(index, 1);
        renderTasks();
        updateProgress();
      };

      li.appendChild(span);
      li.appendChild(deleteBtn);
      taskList.appendChild(li);

      // Trigger CSS transition
      requestAnimationFrame(() => {
        li.classList.add('task-enter-active');
      });
    });
  }

  addTaskBtn.addEventListener('click', () => {
    const taskName = taskInput.value.trim();
    if (taskName) {
      tasks.push({ name: taskName, completed: false });
      taskInput.value = '';
      renderTasks();
      updateProgress();
    }
  });

  taskInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') addTaskBtn.click();
  });
</script>

</body>
</html>
