<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productivity RPG</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .container { width: 90%; max-width: 500px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
  h1 { text-align: center; margin-bottom: 20px; }
  input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
  button { background: #4CAF50; color: white; border: none; cursor: pointer; }
  button:hover { background: #45a049; }
  .task { display: flex; justify-content: space-between; padding: 10px; margin: 5px 0; border-radius: 5px; background: #eee; }
  .priority-High { border-left: 5px solid #e74c3c; }
  .priority-Medium { border-left: 5px solid #f1c40f; }
  .priority-Low { border-left: 5px solid #2ecc71; }
  .event { background: #ffeaa7; padding: 10px; margin: 5px 0; border-radius: 5px; }
  .hidden { display: none; }
  .progress { height: 20px; background: #eee; border-radius: 10px; overflow: hidden; margin: 10px 0; }
  .progress-bar { height: 100%; background: #4CAF50; width: 0%; transition: width 0.5s; }
  .celebration { text-align: center; font-size: 1.5em; color: #27ae60; }
</style>
</head>
<body>
<div class="container">
  <!-- Add Tasks Screen -->
  <div id="addTasksScreen">
    <h1>Plan Your Day</h1>
    <input type="text" id="taskInput" placeholder="Enter a task">
    <select id="priorityInput">
      <option value="High">High Priority</option>
      <option value="Medium">Medium Priority</option>
      <option value="Low">Low Priority</option>
    </select>
    <button onclick="addTask()">Add Task</button>
    <div id="taskList"></div>
    <button onclick="startDay()" style="margin-top:10px;">Start Day</button>
  </div>

  <!-- Day Simulation Screen -->
  <div id="dayScreen" class="hidden">
    <h1>Task Progression</h1>
    <div id="currentTask"></div>
    <button onclick="completeTask()">Complete Task</button>
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="eventLog"></div>
  </div>

  <!-- Celebration Screen -->
  <div id="celebrationScreen" class="hidden">
    <h1 class="celebration">🎉 Congrats! Day Completed! 🎉</h1>
    <button onclick="resetGame()">Start New Day</button>
  </div>
</div>

<script>
let tasks = [];
let currentTaskIndex = 0;
const randomEvents = [
  "Your coworker stole your stapler 😆",
  "A motivational cat meme pops up 🐱",
  "You got a coffee from a secret admirer ☕",
  "Email bomb! 3 new tasks appear 📧",
  "Manager sends surprise praise! 📝",
];

function addTask() {
  const taskInput = document.getElementById("taskInput");
  const priorityInput = document.getElementById("priorityInput");
  const taskList = document.getElementById("taskList");
  if(taskInput.value.trim() === "") return;
  const task = {
    id: Date.now(),
    title: taskInput.value,
    priority: priorityInput.value,
    completed: false
  };
  tasks.push(task);
  const taskDiv = document.createElement("div");
  taskDiv.className = `task priority-${task.priority}`;
  taskDiv.id = `task-${task.id}`;
  taskDiv.innerText = `${task.title} (${task.priority})`;
  taskList.appendChild(taskDiv);
  taskInput.value = "";
}

function startDay() {
  if(tasks.length === 0) {
    alert("Please add at least one task!");
    return;
  }
  document.getElementById("addTasksScreen").classList.add("hidden");
  document.getElementById("dayScreen").classList.remove("hidden");
  showCurrentTask();
}

function showCurrentTask() {
  if(currentTaskIndex >= tasks.length) {
    celebrate();
    return;
  }
  const task = tasks[currentTaskIndex];
  document.getElementById("currentTask").innerText = `Task: ${task.title} (${task.priority})`;
  updateProgress();
}

function completeTask() {
  tasks[currentTaskIndex].completed = true;
  maybeTriggerEvent();
  currentTaskIndex++;
  showCurrentTask();
}

function maybeTriggerEvent() {
  if(Math.random() < 0.3) { // 30% chance
    const eventLog = document.getElementById("eventLog");
    const eventText = randomEvents[Math.floor(Math.random() * randomEvents.length)];
    const div = document.createElement("div");
    div.className = "event";
    div.innerText = eventText;
    eventLog.prepend(div);
    if(eventText.includes("Email bomb")) {
      // Add random tasks
      for(let i=0;i<3;i++) {
        const task = {id: Date.now()+i, title: "Extra Task", priority: "Medium", completed: false};
        tasks.push(task);
      }
    }
  }
}

function updateProgress() {
  const progress = (tasks.filter(t => t.completed).length / tasks.length) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
}

function celebrate() {
  document.getElementById("dayScreen").classList.add("hidden");
  document.getElementById("celebrationScreen").classList.remove("hidden");
}

function resetGame() {
  tasks = [];
  currentTaskIndex = 0;
  document.getElementById("taskList").innerHTML = "";
  document.getElementById("eventLog").innerHTML = "";
  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("addTasksScreen").classList.remove("hidden");
  document.getElementById("celebrationScreen").classList.add("hidden");
}
</script>
</body>
</html>
